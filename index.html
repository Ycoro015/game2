<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>みーころの冒険 完成版</title>
<style>
body{
    margin:0;
    background:#000814;
    color:white;
    text-align:center;
}
canvas{
    background:#0a0a1a;
    display:block;
    margin:20px auto;
    border:2px solid #444;
}
#text{
    width:600px;
    margin:auto;
    padding:10px;
    background:rgba(255,255,255,0.1);
    border-radius:10px;
}
button{
    margin:5px;
    padding:8px 15px;
}
</style>
</head>
<body>

<h2>みーころの冒険（完成版）</h2>
<canvas id="game" width="600" height="400"></canvas>
<div id="text">仲間に触れて話そう</div>
<div id="choices"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {x:50,y:50,size:20};
let text = document.getElementById("text");
let choices = document.getElementById("choices");

let story = 0;

// 仲間
let characters = [
 {name:"セイラ", x:200, y:100, talked:false, msg:"セイラ「光が怖いの…失った時を思い出すから」"},
 {name:"誠也", x:400, y:200, talked:false, msg:"誠也「守るために、何かを壊すこともある」"},
 {name:"みーくん", x:100, y:300, talked:false, msg:"みーくん「ぼくたち…どこかで会ってるよね？」"},
 {name:"レオン", x:500, y:100, talked:false, msg:"レオン「真実は、たぶん優しくないぞ」"}
];

let castle = {x:300, y:50, active:false};

let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function update(){
    if(keys["ArrowUp"]) player.y -= 2;
    if(keys["ArrowDown"]) player.y += 2;
    if(keys["ArrowLeft"]) player.x -= 2;
    if(keys["ArrowRight"]) player.x += 2;

    // 仲間と会話
    characters.forEach(c=>{
        let dx = player.x - c.x;
        let dy = player.y - c.y;
        if(Math.sqrt(dx*dx + dy*dy) < 25 && !c.talked){
            c.talked = true;
            text.innerHTML = c.msg;
            story++;

            if(story === 4){
                text.innerHTML += "<br><br>すべての記憶が揃い始める…";
                castle.active = true;
            }
        }
    });

    // 魔王城
    if(castle.active){
        let dx = player.x - castle.x;
        let dy = player.y - castle.y;
        if(Math.sqrt(dx*dx + dy*dy) < 30){
            finalEvent();
        }
    }
}

function finalEvent(){
    text.innerHTML =
    "魔王城の奥。<br><br>" +
    "そこにあったのは…鏡。<br><br>" +
    "映っていたのは、五人。<br><br>" +
    "魔王とは——この五人自身だった。<br><br>" +
    "光を封じたのは、自分たちの『心』。";

    choices.innerHTML =
    "<button onclick='endingA()'>誰かを犠牲にする</button>" +
    "<button onclick='endingB()'>全員で抗う</button>";

    // 動き止める
    keys = {};
}

function endingA(){
    text.innerHTML =
    "みーころは決断する。<br><br>" +
    "光のために、誰かを消す。<br><br>" +
    "世界は明るくなった。<br>" +
    "でも、その笑顔は一つ減っていた。<br><br>" +
    "【エンディングA：光と犠牲】";

    choices.innerHTML = "<button onclick='location.reload()'>最初から</button>";
}

function endingB(){
    text.innerHTML =
    "「誰も失わない。」<br><br>" +
    "五人は手を取る。<br><br>" +
    "闇はゆっくり溶けていく。<br>" +
    "光は戻る——優しく。<br><br>" +
    "【エンディングB：共鳴する光】";

    choices.innerHTML = "<button onclick='location.reload()'>最初から</button>";
}

function draw(){
    ctx.clearRect(0,0,600,400);

    // プレイヤー
    ctx.fillStyle = "white";
    ctx.fillRect(player.x, player.y, 20, 20);

    // 仲間
    ctx.fillStyle = "cyan";
    characters.forEach(c=>{
        ctx.fillRect(c.x, c.y, 20, 20);
    });

    // 魔王城
    if(castle.active){
        ctx.fillStyle = "red";
        ctx.fillRect(castle.x, castle.y, 30, 30);
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
